<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HuantaStatus | Estado de Zonas Turísticas</title>
    <meta name="description" content="Consulta el estado en tiempo real de las cataratas, santuarios y miradores de Huanta, Ayacucho. Vive 'La Esmeralda de los Andes'." />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body class="bg-slate-950 text-slate-100 selection:bg-blue-500/30">
    <div id="app" class="w-full flex flex-col">
      <!-- El contenido se cargará dinámicamente -->
    </div>
    
    <!-- Modal para ver imágenes en tamaño grande -->
    <div id="image-modal" class="fixed inset-0 z-[100] hidden bg-slate-950/98 backdrop-blur-3xl flex items-center justify-center p-4 cursor-zoom-out overflow-hidden">
        <!-- Close Button -->
        <button id="close-modal" class="absolute top-4 right-4 md:top-6 md:right-6 text-white/40 hover:text-white transition-all p-2 bg-white/5 rounded-full z-[120]">
            <i data-lucide="x" class="w-6 h-6 md:w-8 md:h-8"></i>
        </button>

        <!-- Navigation Arrows (Hidden on very small screens or smaller on mobile) -->
        <button id="prev-btn" class="absolute left-2 md:left-4 top-1/2 -translate-y-1/2 p-2 md:p-4 text-white/20 hover:text-emerald-400 transition-all z-[110] outline-none">
            <i data-lucide="chevron-left" class="w-8 h-8 md:w-12 md:h-12"></i>
        </button>
        
        <button id="next-btn" class="absolute right-2 md:right-4 top-1/2 -translate-y-1/2 p-2 md:p-4 text-white/20 hover:text-emerald-400 transition-all z-[110] outline-none">
            <i data-lucide="chevron-right" class="w-8 h-8 md:w-12 md:h-12"></i>
        </button>

        <!-- Main Modal Content -->
        <div class="relative w-full h-full flex items-center justify-center pointer-events-none">
            <div class="w-full max-w-5xl flex flex-col items-center animate-modalIn pointer-events-auto">
                <!-- Image Container -->
                <div class="relative w-full flex justify-center bg-transparent">
                    <img id="modal-img" src="" alt="" class="max-w-full max-h-[50vh] md:max-h-[70vh] object-contain rounded-xl shadow-2xl border border-white/10" />
                </div>
                
                <!-- Caption Container (Below) -->
                <div id="modal-caption" class="mt-4 md:mt-8 w-full max-w-2xl bg-white/5 backdrop-blur-md p-5 md:p-8 rounded-2xl md:rounded-3xl border border-white/5 text-center shadow-lg mx-2">
                    <span id="modal-category" class="text-[9px] md:text-[10px] text-emerald-500 font-black uppercase tracking-[0.3em] mb-1 md:mb-2 block"></span>
                    <h3 id="modal-title" class="text-xl md:text-3xl font-black text-white mb-2 md:mb-3 tracking-tight"></h3>
                    <p id="modal-desc" class="text-slate-400 text-[10px] md:text-sm leading-relaxed max-w-xl mx-auto"></p>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
